<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Baby Girl ❤️</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff5f7 0%, #ffdeeb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.1);
            max-width: 85%;
            border: 1px solid #ffccd5;
        }
        h2 { color: #d63384; font-weight: normal; font-style: italic; }
        #message {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
            white-space: pre-line;
            min-height: 150px;
        }
        .floating-heart {
            position: absolute;
            color: #ff8fa3;
            opacity: 0.6;
            pointer-events: none;
            animation: floatUp 4s ease-in-out infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        button {
            background: #ff758c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #ff4d6d; }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h2 id="header">A little something for you...</h2>
        <div id="message"></div>
        <button id="btn" onclick="revealMessage()">Open it ❤️</button>
    </div>

    <script>
        const myMessage = "To my beautiful baby girl,\n\nI’m so sorry about yesterday. I hate that I went so long without messaging you, and the last thing I ever want to do is make you feel ignored or upset. You are always on my mind.\n\nI also wanted to say how incredibly proud I am of you. Seeing how hard you’re working for your exams makes me admire you even more. You’re going to get amazing results because you’re brilliant.\n\nI love you unconditionally, more than anything in this world. ❤️";

        function revealMessage() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('header').innerText = "For My Love";
            
            let i = 0;
            const target = document.getElementById("message");
            
            function type() {
                if (i < myMessage.length) {
                    target.innerHTML += myMessage.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
            setInterval(createFloatingHeart, 500);
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 90 + '%';
            heart.style.top = Math.random() * 90 + '%';
            document.getElementById('box').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
    </script>
</body>
</html>
